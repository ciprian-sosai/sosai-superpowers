<!DOCTYPE html>
<!-- Derived from superpowers (https://github.com/obra/superpowers) by Jesse Vincent, MIT License. -->
<!-- Adapted for sosai-superpowers with cowork-specific layouts by Ciprian Sosai. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brainstorm Companion</title>
<style>
  :root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --border: #d1d1d6;
    --text: #1d1d1f;
    --text-secondary: #6e6e73;
    --accent: #0071e3;
    --accent-light: #e8f0fe;
    --green: #28a745;
    --green-light: #d4edda;
    --red: #dc3545;
    --red-light: #f8d7da;
    --radius: 12px;
    --radius-sm: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1d1d1f;
      --surface: #2c2c2e;
      --border: #3a3a3c;
      --text: #f5f5f7;
      --text-secondary: #aeaeb2;
      --accent: #0a84ff;
      --accent-light: #1c3a5e;
      --green-light: #1a3a24;
      --red-light: #3a1c1f;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 { font-size: 1rem; font-weight: 600; color: var(--text); }
  header .status { font-size: 0.75rem; color: var(--text-secondary); }

  main {
    flex: 1;
    padding: 1.5rem;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }

  h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: var(--text); }
  h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
  p  { color: var(--text-secondary); margin-bottom: 1rem; line-height: 1.5; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.75rem; }
  .option {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.25rem; cursor: pointer; display: flex; align-items: flex-start; gap: 1rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .option:hover { border-color: var(--accent); }
  .option.selected { border-color: var(--accent); background: var(--accent-light); }
  .option .badge {
    background: var(--accent); color: #fff; font-weight: 700; font-size: 0.85rem;
    width: 1.75rem; height: 1.75rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .option .content .label { font-weight: 600; margin-bottom: 0.25rem; }
  .option .content .desc  { font-size: 0.875rem; color: var(--text-secondary); }

  /* CARDS */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; }
  .card {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 1.25rem; cursor: pointer; transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--accent); }
  .card.selected { border-color: var(--accent); background: var(--accent-light); }
  .card .card-title { font-weight: 600; margin-bottom: 0.5rem; }
  .card .card-body  { font-size: 0.875rem; color: var(--text-secondary); }

  /* SPLIT */
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .split { grid-template-columns: 1fr; } }

  /* MOCKUP */
  .mockup { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }

  /* PROS/CONS */
  .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } }
  .pros, .cons { background: var(--surface); border-radius: var(--radius); padding: 1rem; }
  .pros { border-top: 4px solid var(--green); }
  .cons { border-top: 4px solid var(--red); }
  .pros h3 { color: var(--green); }
  .cons h3 { color: var(--red); }
  .pros ul, .cons ul { padding-left: 1.25rem; }
  .pros li, .cons li { font-size: 0.875rem; margin-bottom: 0.4rem; color: var(--text-secondary); }

  /* PROCESS FLOW */
  .process-flow { display: flex; flex-direction: column; gap: 0; }
  .process-step {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.25rem; cursor: pointer; display: flex; align-items: center; gap: 1rem;
    transition: border-color 0.15s; position: relative;
  }
  .process-step:not(:last-child)::after {
    content: '↓'; position: absolute; bottom: -1.35rem; left: 50%; transform: translateX(-50%);
    color: var(--text-secondary); font-size: 1.25rem; z-index: 1;
  }
  .process-step:not(:last-child) { margin-bottom: 1.5rem; }
  .process-step:hover { border-color: var(--accent); }
  .process-step.selected { border-color: var(--accent); background: var(--accent-light); }
  .process-step .step-number {
    background: var(--accent); color: #fff; font-weight: 700; font-size: 0.85rem;
    width: 2rem; height: 2rem; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .process-step .step-content .step-title { font-weight: 600; }
  .process-step .step-content .step-desc  { font-size: 0.875rem; color: var(--text-secondary); }

  /* DECISION TREE */
  .decision-tree { display: flex; flex-direction: column; gap: 1rem; }
  .decision-node { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
  .decision-node .question { font-weight: 600; margin-bottom: 0.75rem; color: var(--text); }
  .decision-branches { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .branch {
    background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 0.5rem 1rem; cursor: pointer; font-size: 0.875rem;
    transition: border-color 0.15s, background 0.15s;
  }
  .branch:hover  { border-color: var(--accent); }
  .branch.selected { border-color: var(--accent); background: var(--accent-light); }

  /* STAKEHOLDER MAP */
  .stakeholder-map { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; }
  .stakeholder {
    background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 1rem; text-align: center; cursor: pointer; transition: border-color 0.15s;
  }
  .stakeholder:hover { border-color: var(--accent); }
  .stakeholder.selected { border-color: var(--accent); background: var(--accent-light); }
  .stakeholder .avatar {
    width: 2.5rem; height: 2.5rem; background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 0.5rem; font-size: 1.1rem; color: #fff; font-weight: 700;
  }
  .stakeholder .name { font-weight: 600; font-size: 0.875rem; }
  .stakeholder .role { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.2rem; }

  /* COMPARISON TABLE */
  .comparison-table {
    width: 100%; border-collapse: collapse; background: var(--surface);
    border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
  }
  .comparison-table th {
    background: var(--accent); color: #fff; padding: 0.75rem 1rem;
    text-align: left; font-size: 0.875rem; font-weight: 600;
  }
  .comparison-table td {
    padding: 0.65rem 1rem; font-size: 0.875rem;
    border-bottom: 1px solid var(--border); color: var(--text-secondary);
  }
  .comparison-table tr:last-child td { border-bottom: none; }
  .comparison-table tr:hover td { background: var(--accent-light); }
  .tick    { color: var(--green); font-weight: 700; }
  .cross   { color: var(--red);   font-weight: 700; }
  .neutral { color: var(--text-secondary); }

  /* INDICATOR BAR */
  #indicator-bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--accent); color: #fff; text-align: center;
    padding: 0.6rem 1rem; font-size: 0.875rem; font-weight: 500;
  }
</style>
</head>
<body>
  <header>
    <h1>Brainstorm Companion</h1>
    <span class="status" id="conn-status">connecting…</span>
  </header>
  <main id="claude-content">
    <!-- CONTENT -->
  </main>
  <div id="indicator-bar"></div>
  <script>
    const status = document.getElementById('conn-status');
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if (status.textContent === 'connecting…') status.textContent = 'live'; }, 1200);
    });
  </script>
</body>
</html>
